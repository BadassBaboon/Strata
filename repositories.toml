# Strata content repositories.
#
# Strata ships no shaders/models itself — it fetches them from one or more
# "library" repositories listed here. Each repository is a Strata-Library-shaped
# tree (index.toml + shader-library/ + external/ + models.toml + presets.toml).
#
# `url` only identifies the GitHub repo (owner/name); do NOT pin a version here.
# Strata discovers the newest version dynamically from the repo's git tags
# (the highest `library-v*` tag) and downloads that tag's zipball — so pushing a
# new `library-vX.Y.Z` tag is automatically picked up, no edit to this file needed.
# Both the jsDelivr form (cdn.jsdelivr.net/gh/OWNER/REPO) and the plain GitHub form
# (github.com/OWNER/REPO) are accepted.
#
# A Settings UI to add custom "Community" repositories comes later; keep `Official`
# first as the trusted default.

schema_version = 1

[[repository]]
name = "Official"
url = "https://github.com/BadassBaboon/Strata-Library"
official = true

# Example of a future community source (commented out — not fetched):
# [[repository]]
# name = "Community"
# url = "https://github.com/someone/strata-community"
# official = false
