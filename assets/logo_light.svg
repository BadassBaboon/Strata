<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <linearGradient id="layerBottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <linearGradient id="layerMiddle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <linearGradient id="layerTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)" />

  <g transform="translate(256, 350)">
    <polygon points="0,-60 140,0 0,60 -140,0" fill="url(#layerBottom)" filter="url(#glow)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  </g>

  <g transform="translate(256, 260)">
    <polygon points="0,-60 140,0 0,60 -140,0" fill="url(#layerMiddle)" filter="url(#glow)" stroke="rgba(255,255,255,0.8)" stroke-width="2"/>
  </g>

  <g transform="translate(256, 170)">
    <polygon points="0,-60 140,0 0,60 -140,0" fill="url(#layerTop)" filter="url(#glow)" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
    <polygon points="0,-60 140,0 0,-15 -140,0" fill="rgba(255,255,255,0.25)" />
  </g>
</svg>
