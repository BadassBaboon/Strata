<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="layerBottom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="layerMiddle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4c1d95" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="layerTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#logoBg)" />
  <g transform="translate(256, 350)">
    <polygon points="0,-60 140,0 0,60 -140,0" fill="url(#layerBottom)" filter="url(#glow)" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  </g>
  <g transform="translate(256, 260)">
    <polygon points="0,-60 140,0 0,60 -140,0" fill="url(#layerMiddle)" filter="url(#glow)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  </g>
  <g transform="translate(256, 170)">
    <polygon points="0,-60 140,0 0,60 -140,0" fill="url(#layerTop)" filter="url(#glow)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
    <polygon points="0,-60 140,0 0,-15 -140,0" fill="rgba(255,255,255,0.15)" />
  </g>
</svg>
